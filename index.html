<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给妈妈的信 - 母亲节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffc0cb 30%, #ff69b4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
            overflow: hidden;
            position: relative;
        }

        .petal {
            position: fixed;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ffb6c1 0%, #ff69b4 100%);
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(110vh) rotate(720deg) translateX(80px);
                opacity: 0;
            }
        }

        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .envelope-container:hover {
            transform: scale(1.03);
        }

        .envelope-container.opened {
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease 0.3s;
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe4e1 100%);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3), 0 0 0 1px rgba(255, 182, 193, 0.5);
            overflow: hidden;
        }

        .envelope-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #ffe4e1 0%, #ffb6c1 100%);
            clip-path: polygon(0 100%, 50% 0, 100% 100%);
            z-index: 2;
        }

        .envelope-left {
            position: absolute;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #ffe4e1 0%, #ffc0cb 100%);
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            z-index: 1;
        }

        .envelope-right {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(270deg, #ffe4e1 0%, #ffc0cb 100%);
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            z-index: 1;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(180deg, #fff0f5 0%, #ffb6c1 100%);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 3;
            box-shadow: 0 2px 10px rgba(255, 105, 180, 0.2);
        }

        .envelope-container.opened .envelope-flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .seal {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 46px;
            height: 46px;
            background: radial-gradient(circle, #ff69b4 0%, #db7093 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            z-index: 4;
            box-shadow: 0 2px 8px rgba(219, 112, 147, 0.4);
            transition: opacity 0.3s ease;
        }

        .envelope-container.opened .seal {
            opacity: 0;
        }

        .hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #c71585;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0.8;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        .envelope-container.opened .hint {
            opacity: 0;
        }

        .letter {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 360px;
            min-height: 0;
            max-height: 85vh;
            background: linear-gradient(180deg, #fffafa 0%, #fff0f5 100%);
            border-radius: 6px;
            padding: 24px 20px;
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 20;
            overflow-y: auto;
            display: none;
        }

        .letter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff69b4, #ffb6c1, #ff69b4);
            border-radius: 6px 6px 0 0;
        }

        .letter.show {
            display: block;
            opacity: 1;
            pointer-events: auto;
            animation: letterFloat 3s ease-in-out infinite;
        }

        @keyframes letterFloat {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -53%); }
        }

        .letter-header {
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #ffb6c1;
        }

        .letter-header h2 {
            font-family: 'KaiTi', 'STKaiti', 'STXingkai', cursive;
            font-size: 26px;
            color: #c71585;
            margin-bottom: 4px;
        }

        .letter-header .date {
            font-size: 12px;
            color: #db7093;
        }

        .letter-body {
            font-size: 15px;
            line-height: 1.9;
            color: #8b4513;
            text-indent: 2em;
        }

        .letter-body p {
            margin-bottom: 10px;
        }

        .letter-footer {
            text-align: right;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #ffb6c1;
        }

        .letter-footer .signature {
            font-family: 'KaiTi', 'STKaiti', 'STXingkai', cursive;
            font-size: 20px;
            color: #c71585;
        }

        .letter-footer .heart {
            font-size: 18px;
            color: #ff1493;
            animation: heartbeat 1.2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
        }

        .flower-deco {
            position: absolute;
            font-size: 24px;
            opacity: 0.25;
            pointer-events: none;
        }

        .flower-deco.top-left { top: 16px; left: 16px; transform: rotate(-20deg); }
        .flower-deco.top-right { top: 16px; right: 16px; transform: rotate(20deg); }
        .flower-deco.bottom-left { bottom: 16px; left: 16px; transform: rotate(20deg); }
        .flower-deco.bottom-right { bottom: 16px; right: 16px; transform: rotate(-20deg); }

        .bg-heart {
            position: fixed;
            font-size: 36px;
            opacity: 0.06;
            pointer-events: none;
            animation: floatHeart 6s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @media (max-width: 480px) {
            .envelope-container {
                width: 280px;
                height: 190px;
            }
            .letter {
                width: 92%;
                max-width: none;
                padding: 20px 16px;
                max-height: 82vh;
            }
            .letter-header h2 {
                font-size: 22px;
            }
            .letter-body {
                font-size: 14px;
                line-height: 1.8;
            }
            .seal {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="petals"></div>

    <div class="bg-heart" style="top: 8%; left: 8%;">♥</div>
    <div class="bg-heart" style="top: 18%; right: 12%; animation-delay: 1s;">♥</div>
    <div class="bg-heart" style="bottom: 12%; left: 15%; animation-delay: 2s;">♥</div>
    <div class="bg-heart" style="bottom: 22%; right: 8%; animation-delay: 3s;">♥</div>

    <div class="envelope-container" id="envelope" onclick="openLetter()">
        <div class="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-left"></div>
            <div class="envelope-right"></div>
            <div class="envelope-bottom"></div>
            <div class="seal">✉</div>
        </div>
        <div class="hint">✦ 点击开封 ✦</div>
    </div>

    <div class="letter" id="letter">
        <div class="flower-deco top-left">✿</div>
        <div class="flower-deco top-right">❀</div>
        <div class="flower-deco bottom-left">✿</div>
        <div class="flower-deco bottom-right">❀</div>

        <div class="letter-header">
            <h2>亲爱的妈妈</h2>
            <div class="date">2026年5月10日 · 母亲节</div>
        </div>

        <div class="letter-body">
            <p>今天是母亲节，我想用这封信，把平时不好意思说出口的话，都告诉您。</p>
            <p>从小到大，您总是把最好的留给我，把最累的扛在自己肩上。您的爱像春风，温柔却无处不在；像阳光，平凡却照亮我前行的每一步。</p>
            <p>以前总觉得"谢谢"太轻，"爱您"太难为情。可今天我想大声说：妈妈，谢谢您为我做的一切，谢谢您包容我的任性，谢谢您在我迷茫时给我力量。</p>
            <p>您总说我是您的骄傲，其实您才是我最大的骄傲。愿岁月温柔待您，愿您永远健康、快乐，笑容如花。</p>
            <p>母亲节快乐！我爱您，不止今天。</p>
        </div>

        <div class="letter-footer">
            <div class="signature">永远爱您的孩子</div>
            <div class="heart">♥</div>
        </div>
    </div>

    <script>
        function createPetals() {
            const container = document.getElementById('petals');
            const petalCount = window.innerWidth < 480 ? 8 : 10;

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = (Math.random() * 95 + 2) + 'vw';
                petal.style.animationDuration = (Math.random() * 4 + 6) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                const size = Math.random() * 10 + 10;
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                container.appendChild(petal);
            }
        }

        function openLetter() {
            const envelope = document.getElementById('envelope');
            const letter = document.getElementById('letter');
            if (envelope.classList.contains('opened')) return;

            envelope.classList.add('opened');
            document.body.style.background = 'linear-gradient(135deg, #fff0f5 0%, #ffe4e1 40%, #ffc0cb 100%)';

            setTimeout(() => {
                letter.classList.add('show');
            }, 400);

            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.style.left = (Math.random() * 90 + 5) + 'vw';
                    petal.style.top = '-30px';
                    petal.style.animationDuration = '5s';
                    petal.style.width = '16px';
                    petal.style.height = '16px';
                    document.getElementById('petals').appendChild(petal);
                    setTimeout(() => petal.remove(), 5000);
                }, i * 250);
            }
        }

        createPetals();
    </script>
</body>
</html>
